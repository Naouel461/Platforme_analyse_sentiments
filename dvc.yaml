stages:
  collect_data:
    cmd: python simple_collector.py --output data/raw/twitter_data.json
    deps:
      - simple_collector.py
    outs:
      - data/raw/twitter_data.json
  
  preprocess:
    cmd: python data/scripts/etl_pipeline.py data/raw/twitter_data.json data/processed
    deps:
      - data/scripts/etl_pipeline.py
      - data/raw/twitter_data.json
    outs:
      - data/processed/train_data.json
      - data/processed/val_data.json
      - data/processed/test_data.json
      - data/processed/metadata.json
  
  analyze_sentiment:
    cmd: python simple_analyzer.py --input data/processed/train_data.json --output data/processed/sentiments.json
    deps:
      - simple_analyzer.py
      - data/processed/train_data.json
    outs:
      - data/processed/sentiments.json
  
  generate_report:
    cmd: python generate_report.py
    deps:
      - generate_report.py
      - data/processed/sentiments.json
    outs:
      - data/processed/report.json
